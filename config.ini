# Advanced Malpractice Detection Configuration
# Modify these values to customize system behavior

[DETECTION_SETTINGS]
max_num_faces = 3
min_detection_confidence = 0.7
min_tracking_confidence = 0.7

[ALERT_THRESHOLDS]
look_away_threshold = 3.0
eye_closure_threshold = 2.0
gaze_threshold = 0.3
ear_threshold = 0.25
blink_consecutive_frames = 3

[IDENTITY_SETTINGS]
identity_threshold = 0.6
embedding_history_size = 50

[AUDIO_SETTINGS]
voice_threshold = 1000
silence_threshold = 500
sample_rate = 44100
chunk_size = 1024

[UI_SETTINGS]
display_scale = 0.7
alert_sound_enabled = true

[LOGGING_SETTINGS]
log_level = INFO
evidence_capture = true
session_reports = true
